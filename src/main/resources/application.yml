spring:
  application:
    name: api_auth
  datasource:
    url: jdbc:mysql://localhost:3306/api_auth?useSSL=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
        timeout: 5000ms

# 认证配置
auth:
  token:
    # 访问令牌过期时间(秒)
    access-token-expire: 3600
    # 刷新令牌过期时间(秒)
    refresh-token-expire: 86400
    token-prefix: "Bearer "
    secret-key: "auth-server-secret-key-2023#$%^&*()"
  cache:
    local:
      # 本地缓存过期时间(秒)
      expire: 300
    redis:
      # Redis缓存过期时间(秒)
      expire: 1800
  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600

# 日志配置
logging:
  level:
    root: INFO
    com.auth: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.mybatis: INFO

# JWT配置
jwt:
  secret: your-jwt-secret-key-change-in-production
  expiration: 7200
  refresh-expiration: 2592000

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always